# One-click: edit secrets below (or use env substitution), then:
#   docker compose up -d
#
# Image: ghcr.io/apaidedie/exa-gate:latest
# Data: ./data is bind-mounted; entrypoint chowns it for the app user (SQLite).
# Keys: add via Admin Console / POST /_proxy/keys (stored encrypted in SQLite).
# Production: put HTTPS reverse proxy in front; set EXA_ADMIN_REQUIRE_HTTPS=true.

services:
  exa-gate:
    image: ghcr.io/apaidedie/exa-gate:latest
    container_name: exa-gate
    restart: always
    ports:
      - "8787:8787"
    volumes:
      - ./data:/data
    environment:
      HOST: "0.0.0.0"
      PORT: "8787"
      EXA_STATE_PATH: /data/exa-proxy.sqlite
      # Generate: openssl rand -hex 32  (do not reuse sample values)
      EXA_KEYS_ENCRYPTION_SECRET: "replace_with_openssl_rand_hex_32"
      # Min 16 chars — client token for proxied Exa routes
      EXA_PROXY_TOKENS: "replace_with_client_token_16+"
      # Min 16 chars — Admin Console / management API
      EXA_ADMIN_TOKENS: "replace_with_admin_token_16+"
